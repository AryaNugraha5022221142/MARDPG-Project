training:
  num_episodes: 10000
  num_agents: 5
  seed: 42
  device: "cuda"

network:
  actor:
    hidden_dim: 128
    lstm_layers: 1
    dropout: 0.0
  critic:
    hidden_dim: 128
    lstm_layers: 1

learning:
  actor_lr: 1.0e-4
  critic_lr: 3.0e-4
  gamma: 0.99
  max_grad_norm: 1.0

memory:
  buffer_size: 2000
  batch_size: 64
  seq_len: 80

update_interval: 20

targets:
  update_rate: 0.03

# FIX 5d: Annealed Gaussian exploration noise parameters (see AnnealedGaussianNoise).
# sigma_start=0.3 covers ~57% of the ±π/6 action range for early exploration.
# total_steps = 10000 episodes × ~500 avg steps = 5M.
exploration:
  sigma_start: 0.3
  sigma_end: 0.05
  total_steps: 5000000

# FIX 1d: terminal bonuses now used by kinematic env baseline reward path
rewards:
  goal_bonus: 0.0
  collision_penalty: 0.0

environment:
  action_bound: 0.5235987756
  arena_size: [100, 100, 60]
  num_obstacles: 25
  max_velocity: 5.0
  rangefinder_max_range: 10.0
  collision_distance: 0.8
  goal_distance: 2.0
  dt: 0.01
  dynamic_ratio: 0.0
  max_steps: 2000
  obs_dim: 30
  reward_type: "baseline"
  rate_limit_per_step: 1.0
  randomize_layouts: true

evaluation:
  scenes: ["urban", "forest", "terrain", "structured", "dynamic"]
  level: 3

obs_structure:
  angles: [0, 2]        # 2 dims: [pitch, yaw]
  ranges: [2, 27]       # 25 dims: rangefinder
  goal: [27, 30]        # 3 dims: [dist, h_angle, v_angle]

curriculum:
  enabled: true
  schedule:
    0: 3      # Episode 0-499: 3 agents
    500: 5    # Episode 500-1499: 5 agents
    1500: 7   # Episode 1500-2999: 7 agents
    3000: 10  # Episode 3000+: 10 agents
  reset_buffer: true  # Clear replay buffer on transition
  transfer_weights: true  # Transfer compatible weights

logging:
  log_dir: "logs"
  checkpoint_dir: "checkpoints"
  log_interval: 100
  save_interval: 500
  use_wandb: false
  wandb_project: "mardpg-thesis"
