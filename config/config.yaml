training:
  num_episodes: 10000
  num_agents: 6
  seed: 42
  device: "cuda"

network:
  actor:
    hidden_dim: 256
    lstm_layers: 1
    dropout: 0.0
  critic:
    hidden_dim: 256
    lstm_layers: 1

learning:
  actor_lr: 0.0001
  critic_lr: 0.001
  gamma: 0.99
  max_grad_norm: 1.0

memory:
  buffer_size: 500
  batch_size: 32
  seq_len: 64

update_interval: 50

targets:
  update_rate: 0.01

rewards:
  weights:
    transfer: 3.0
    collision: 10.0
    smoothness: 0.01
    step_penalty: 0.05
    free_space: 0.0
    tracking: 0.3        # Velocity tracking penalty weight
  goal_bonus: 50.0
  collision_penalty: -100.0

environment:
  action_bound: 0.5235987756
  arena_size: [30, 30, 15]
  num_obstacles: 0
  max_velocity: 5.0
  rangefinder_max_range: 30.0
  collision_distance: 0.8
  goal_distance: 2.0
  dt: 0.01
  dynamic_ratio: 0.0       # CHANGED: disable dynamic obstacles until system is stable
  max_steps: 2000
  obs_dim: 30              # Updated to match paper (25 rangefinder + 5 goal)
  reward_type: "baseline"
  rate_limit_per_step: 1.0  # CHANGED: increased from 0.5

logging:
  log_dir: "logs"
  checkpoint_dir: "checkpoints"
  log_interval: 100
  save_interval: 500
  use_wandb: false
  wandb_project: "mardpg-thesis"
