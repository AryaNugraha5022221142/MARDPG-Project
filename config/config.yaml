training:
  num_episodes: 10000
  episode_length: 500
  num_agents: 3
  seed: 42
  device: "cuda"

network:
  actor:
    hidden_dim: 128
    lstm_layers: 1
    dropout: 0.0
    fc_dims: [256, 128]
  critic:
    fc_dims: [512, 256, 128]
    batch_norm: true

learning:
  actor_lr: 0.0001
  critic_lr: 0.001
  optimizer: "adam"
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_decay: 0.9995
  max_grad_norm: 1.0

memory:
  buffer_size: 1000
  batch_size: 32
  seq_len: 16

targets:
  update_rate: 0.01
  update_freq: 1

rewards:
  weights:
    transfer: 2.0
    collision: 100.0
    smoothness: 0.01
    step_penalty: 0.1
  goal_bonus: 100.0
  collision_penalty: -50.0

logging:
  log_interval: 100
  save_interval: 500
  log_dir: "./logs"
  checkpoint_dir: "./checkpoints"
  use_wandb: false # Set to false by default to avoid import errors
  wandb_project: "mardpg-thesis"

evaluation:
  eval_episodes: 100
  eval_interval: 500

environment:
  arena_size: [100, 100, 40]
  num_obstacles: 25
  max_velocity: 5.0
  rangefinder_max_range: 30.0
  collision_distance: 0.8
  goal_distance: 2.0
  dt: 0.01
  dynamic_ratio: 0.3
