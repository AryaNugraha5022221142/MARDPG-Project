training:
  num_episodes: 10000
  num_agents: 3
  seed: 42
  device: "cuda"

network:
  actor:
    hidden_dim: 256       # was 128 — larger for 33-dim input
    lstm_layers: 1
    dropout: 0.0
    fc_dims: [256, 128]
  critic:
    hidden_dim: 256
    fc_dims: [512, 256, 128]

learning:
  actor_lr: 0.0001
  critic_lr: 0.001
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_decay: 0.9995
  max_grad_norm: 1.0

memory:
  buffer_size: 2000       # episodes
  batch_size: 32
  seq_len: 64             # was 16 — gives LSTM meaningful horizon

targets:
  update_rate: 0.01

rewards:
  weights:
    transfer: 1.0
    collision: 25.0
    smoothness: 0.01
    step_penalty: 0.1
    free_space: 0.05
  goal_bonus: 200.0
  collision_penalty: -50.0

environment:
  arena_size: [100, 100, 40]
  num_obstacles: 25
  max_velocity: 5.0
  rangefinder_max_range: 30.0
  collision_distance: 0.8
  goal_distance: 2.0
  dt: 0.01
  dynamic_ratio: 0.3
  max_steps: 2000          # was 1000 — 20 s at dt=0.01
  obs_dim: 34              # was 33 — added is_saturated
  reward_type: "exponential"

logging:
  log_dir: "logs"
  checkpoint_dir: "checkpoints"
  log_interval: 100
  save_interval: 500
  use_wandb: false
  wandb_project: "mardpg-thesis"
