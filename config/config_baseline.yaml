training:
  num_episodes: 10000
  num_agents: 3
  seed: 42
  device: "cuda"

network:
  actor:
    hidden_dim: 128
    lstm_layers: 1
    dropout: 0.0
  critic:
    hidden_dim: 128
    lstm_layers: 1

learning:
  actor_lr: 0.01
  critic_lr: 0.01
  gamma: 0.99
  max_grad_norm: 1.0

memory:
  buffer_size: 500
  batch_size: 128
  seq_len: 80

update_interval: 100

targets:
  update_rate: 0.01

# FIX 5d: Annealed Gaussian exploration noise parameters (see AnnealedGaussianNoise).
# sigma_start=0.3 covers ~57% of the ±π/6 action range for early exploration.
# total_steps = 10000 episodes × ~500 avg steps = 5M.
exploration:
  sigma_start: 0.3
  sigma_end: 0.05
  total_steps: 5000000

# FIX 1d: terminal bonuses now used by kinematic env baseline reward path
rewards:
  goal_bonus: 50.0
  collision_penalty: -50.0

environment:
  action_bound: 0.5235987756
  arena_size: [30, 30, 60]
  num_obstacles: 0
  max_velocity: 5.0
  rangefinder_max_range: 30.0
  collision_distance: 0.8
  goal_distance: 2.0
  dt: 0.01
  dynamic_ratio: 0.0
  max_steps: 2000
  obs_dim: 30
  reward_type: "baseline"
  rate_limit_per_step: 1.0

logging:
  log_dir: "logs"
  checkpoint_dir: "checkpoints"
  log_interval: 100
  save_interval: 500
  use_wandb: false
  wandb_project: "mardpg-thesis"
